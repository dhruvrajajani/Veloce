<!-- Micro-interaction Script -->
<script>
        const loginBtn = document.getElementById('toggle-login');
        const signupBtn = document.getElementById('toggle-signup');
        const loginContainer = document.getElementById('login-container');
        const signupContainer = document.getElementById('signup-container');
        const loginIndicator = document.getElementById('login-indicator');
        const signupIndicator = document.getElementById('signup-indicator');

        function showLogin() {
            // Container state
            loginContainer.classList.remove('hidden');
            setTimeout(() => {
                loginContainer.classList.remove('opacity-0', '-translate-x-8');
                loginContainer.classList.add('opacity-100', 'translate-x-0');
            }, 10);
            
            signupContainer.classList.add('hidden', 'opacity-0', 'translate-x-8');
            
            // Header state
            loginBtn.classList.add('text-primary');
            loginBtn.classList.remove('text-on-surface-variant');
            signupBtn.classList.add('text-on-surface-variant');
            signupBtn.classList.remove('text-primary');
            
            loginIndicator.classList.remove('opacity-0');
            signupIndicator.classList.add('opacity-0');
        }

        function showSignup() {
            // Container state
            signupContainer.classList.remove('hidden');
            setTimeout(() => {
                signupContainer.classList.remove('opacity-0', 'translate-x-8');
                signupContainer.classList.add('opacity-100', 'translate-x-0');
            }, 10);

            loginContainer.classList.add('hidden', 'opacity-0', '-translate-x-8');

            // Header state
            signupBtn.classList.add('text-primary');
            signupBtn.classList.remove('text-on-surface-variant');
            loginBtn.classList.add('text-on-surface-variant');
            loginBtn.classList.remove('text-primary');

            signupIndicator.classList.remove('opacity-0');
            loginIndicator.classList.add('opacity-0');
        }

        loginBtn.addEventListener('click', showLogin);
        signupBtn.addEventListener('click', showSignup);
        
        // Initial state logic based on intent (defaulting to Login)
        showLogin();
    </script>
